version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sniffer_postgres
    restart: always
    environment:
      POSTGRES_DB: sniffer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sniffer:
    build:
      context: ./sniffer-app
      dockerfile: Dockerfile
    container_name: sniffer_app
    restart: on-failure
    network_mode: "host"
    depends_on:
      - db
    environment:
      DB_HOST: "127.0.0.1"
      DB_NAME: "sniffer_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
    command: ["-i", "eth0"]

  mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: sniffer_mcp
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db

volumes:
  postgres_data: